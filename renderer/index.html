<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' http: https: data:;">
  <title>Nori Browser</title>
  <link rel="stylesheet" href="../node_modules/xterm/css/xterm.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">
        <span>Terminal</span>
        <span id="cdp-info"></span>
      </div>
      <div id="terminal-container"></div>
    </div>
    <div id="divider"></div>
    <div id="browser-area">
      <div id="toolbar">
        <button id="btn-back" title="Back">&#8592;</button>
        <button id="btn-forward" title="Forward">&#8594;</button>
        <button id="btn-reload" title="Reload">&#8635;</button>
        <div id="url-bar-wrapper">
          <input id="url-bar" type="text" value="" spellcheck="false" placeholder="Search Google or enter URL" autocomplete="off">
          <div id="omnibar-dropdown"></div>
        </div>
      </div>
      <div id="tab-bar">
        <div id="tab-list"></div>
        <button id="new-tab-btn" title="New Tab">+</button>
      </div>
      <div id="find-bar" class="hidden">
        <input id="find-input" type="text" placeholder="Find in page" spellcheck="false">
        <span id="find-matches">0 of 0</span>
        <button id="find-prev-btn" title="Previous">&#8593;</button>
        <button id="find-next-btn" title="Next">&#8595;</button>
        <button id="find-close-btn" title="Close">&#10005;</button>
      </div>
      <div id="download-shelf" class="hidden"></div>
      <div id="status-bar" class="hidden"></div>
      <div id="zoom-indicator" class="hidden"></div>
    </div>
  </div>
  <script src="bundle.js"></script>
</body>
</html>
